<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
    <title>QR Code Encoder</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap-theme.min.css" integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp" crossorigin="anonymous">

    <!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
  </head>
  <body>
    <div class="container">
      <ol class="breadcrumb">
        <li><a href="../index.html">utils.glump.net</a></li>
        <li class="active">QR Code Encoder</li>
      </ol>

      <form>
        <div class="form-group">
          <label for="data">Data to encode:</label>
          <textarea class="form-control" id="data" rows="8"></textarea>
        </div>
        <div class="form-group">
          <label for="data">Data mode:</label>
          <label class="radio-inline">
            <input type="radio" name="mode" id="mode-1" value="plain" checked="checked"> Plain text
          </label>
          <label class="radio-inline">
            <input type="radio" name="mode" id="mode-2" value="gtm"> GotoMeeting Invite
          </label>
        </div>
        <button type="button" class="btn btn-primary" id="go">Encode</button>
        <button type="button" class="btn btn-default" id="clear">Clear</button>
      </form>

      <hr />

      <div id="result">
      </div><br />
      <p id="result-text"></p>

    </div><!-- /.container -->

    <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <!-- Include all compiled plugins (below), or include individual files as needed -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa" crossorigin="anonymous"></script>
    <script src="qrcodejs/qrcode.min.js"></script>
    <script src="qrweb.js"></script>
  </body>
</html>
